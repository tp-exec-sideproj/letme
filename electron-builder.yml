appId: com.system.audiohelper
productName: System Audio Helper
directories:
  output: dist
files:
  - dist-electron/**/*
  - dist/**/*
  - resources/**/*
win:
  executableName: AudioHelper
  icon: resources/icon.png
  target: nsis
mac:
  bundleIdentifier: com.system.audiohelper
  category: public.app-category.utilities
  icon: resources/icon.png
  target: dmg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
