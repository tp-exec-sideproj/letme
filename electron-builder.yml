appId: com.system.audiohelper
productName: System Audio Helper
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
  - node_modules/**/*
win:
  executableName: AudioHelper
  icon: build/icon.ico
  target: nsis
mac:
  appId: com.system.audiohelper
  category: public.app-category.utilities
  icon: build/icon.ico
  target: dmg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
