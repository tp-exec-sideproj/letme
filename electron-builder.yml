appId: Microsoft.Windows.AudioDeviceHost
productName: Windows Audio Device Host
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
  - node_modules/**/*
publish:
  provider: github
  owner: tp-exec-sideproj
  repo: letme
  releaseType: release
win:
  executableName: AudioDeviceHost
  icon: build/icon.ico
  target: nsis
mac:
  appId: com.apple.audio.devicehost
  category: public.app-category.utilities
  icon: build/icon.ico
  target: dmg
  extendInfo:
    LSUIElement: true
linux:
  executableName: audio-device-host
  category: AudioVideo
  target: AppImage
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
  installerIcon: build/icon.ico
  runAfterFinish: true
  include: build/installer.nsh
