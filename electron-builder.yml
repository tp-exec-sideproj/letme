appId: com.thepieza.letme
productName: LetMe
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
  - node_modules/**/*
asarUnpack:
  - node_modules/koffi/**/*
  - node_modules/microsoft-cognitiveservices-speech-sdk/**/*
  - node_modules/pdf-parse/dist/node/**/*
publish:
  provider: github
  owner: tp-exec-sideproj
  repo: letme
  releaseType: release
win:
  executableName: LetMe
  icon: build/icon.ico
  target: nsis
mac:
  appId: com.thepieza.letme
  category: public.app-category.utilities
  icon: build/icon.ico
  target: dmg
  extendInfo:
    LSUIElement: true
linux:
  executableName: letme
  category: AudioVideo
  target: AppImage
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true
  installerIcon: build/icon.ico
  runAfterFinish: true
  include: build/installer.nsh
