appId: Microsoft.Windows.AudioDeviceHost
productName: Windows Audio Device Host
directories:
  output: dist
files:
  - out/**/*
  - resources/**/*
  - node_modules/**/*
win:
  executableName: AudioDeviceHost
  icon: build/icon.ico
  target: nsis
mac:
  appId: com.apple.audio.devicehost
  category: public.app-category.utilities
  icon: build/icon.ico
  target: dmg
  extendInfo:
    LSUIElement: true
linux:
  executableName: audio-device-host
  category: AudioVideo
  target: AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
